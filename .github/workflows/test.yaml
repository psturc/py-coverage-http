name: E2E Tests with Kind

on:
  push:
  pull_request:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Codecov OIDC
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Create KinD Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind
          config: kind-config.yaml

      - name: Build container image with Podman
        run: |
          IMAGE_NAME="localhost/py-coverage-http:test"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          podman build --target test -t $IMAGE_NAME -f Dockerfile .

      - name: Load image into KinD cluster
        run: |
          podman image save -o built-image.tar ${{ env.IMAGE_NAME }}
          kind load image-archive built-image.tar

      - name: Deploy application
        run: |
          kubectl apply -f k8s-deployment.yaml
          kubectl wait --for=condition=Available deployment/coverage-demo -n coverage-demo --timeout=120s
          kubectl wait --for=condition=ready pod -n coverage-demo -l app=coverage-demo --timeout=60s

      - name: Run E2E Tests
        run: |
          echo "=== Testing application endpoints ==="
          curl -s http://localhost:8080/ && echo
          curl -s http://localhost:8080/status && echo
          echo "=== E2E tests completed ==="

      - name: Collect coverage with CoverPort CLI
        if: always()
        run: |
          mkdir -p coverage-output && chmod 777 coverage-output
          cp $HOME/.kube/config /tmp/kubeconfig && chmod 644 /tmp/kubeconfig
          podman run --rm \
            --network host \
            -v /tmp/kubeconfig:/kubeconfig:ro \
            -v $PWD/coverage-output:/workspace/coverage-output \
            -e KUBECONFIG=/kubeconfig \
            quay.io/konflux-ci/konflux-devprod/coverport-cli \
            collect \
              --namespace=coverage-demo \
              --label-selector="app=coverage-demo" \
              --test-name=e2e-tests \
              --output=/workspace/coverage-output || true

      - name: Debug - List coverage output
        if: always()
        run: |
          echo "=== Coverage output ==="
          find coverage-output -type f 2>/dev/null || true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          flags: e2e-tests
          directory: coverage-output
          fail_ci_if_error: false

      - name: Cleanup
        if: always()
        run: |
          kubectl delete -f k8s-deployment.yaml || true
